<!DOCTYPE html>
<html>
<head>
  <title>Nail Warehouse India</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#fff5f7;
    }

    header{
      background:#111;
      color:white;
      text-align:center;
      padding:20px;
    }

    .hero{
      padding:20px;
      text-align:center;
    }

    .hero img{
      width:100%;
      border-radius:20px;
    }

    .products{
      display:flex;
      justify-content:center;
      padding:30px;
    }

    .card{
      background:white;
      width:350px;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 5px 20px rgba(0,0,0,0.15);
    }

    .card img{
      width:100%;
      display:block;
    }

    .content{
      padding:20px;
      text-align:center;
    }

    .content h2{
      margin-bottom:15px;
      color:#222;
    }

    .price{
      font-size:30px;
      color:#e91e63;
      font-weight:bold;
      margin-bottom:20px;
    }

    button{
      background:#e91e63;
      color:white;
      border:none;
      padding:12px 25px;
      border-radius:10px;
      font-size:16px;
      cursor:pointer;
    }

    footer{
      background:#111;
      color:white;
      text-align:center;
      padding:20px;
      margin-top:30px;
    }
  </style>
</head>

<body>

<header>
  <h1>Nail Warehouse India</h1>
  <p>Premium Nail Products & Accessories</p>
</header>

<section class="hero">
  <img src="ChatGPT Image Jul 11, 2026, 02_34_33 AM.png" alt="Banner">
</section>

<section class="products">

  <div class="card">
    <img src="ChatGPT Image Jul 11, 2026, 02_34_33 AM.png" alt="SAVNI Cat Eye Set">

    <div class="content">
      <h2>SAVNI Cat Eye Fashion Choice Set</h2>

      <div class="price">
        ₹999
      </div>

      <button>Add to Cart</button>
    </div>
  </div>

</section>

<footer>
  © 2025 Nail Warehouse India
</footer>

</body>
</html>
